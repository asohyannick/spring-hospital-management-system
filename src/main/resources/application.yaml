spring:
  web:
    resources:
      add-mappings: false

  jackson:
    default-property-inclusion: non_null

  application:
    name: ${APP_NAME}

  threads:
    virtual:
      enabled: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}

server:
  port: ${APPLICATION_PORT}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration: ${ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION}
  refresh-access-token: ${REFRESH_ACCESS_TOKEN}

stripe:
  api-key: ${STRIPE_API_KEY}

firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  private-key-id: ${FIREBASE_PRIVATE_KEY_ID}
  private-key: ${FIREBASE_PRIVATE_KEY}
  client-email: ${FIREBASE_CLIENT_EMAIL}
  client-id: ${FIREBASE_CLIENT_ID}
  auth-url: ${FIREBASE_AUTH_URL}
  token-url: ${FIREBASE_TOKEN_URL}
  cert-url: ${FIREBASE_CERT_URL}

logging:
  level:
    org.springframework.mail: INFO
    jakarta.mail: WARN

google:
  api:
    key: ${GOOGLE_GEMINI_API_KEY}

api:
  version: ${API_VERSION}

cors:
  allowed-origins: ${FRONTEND_DOMAINS}
  allowed-methods: ${ALLOWED_METHODS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

github:
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}
  redirect-uri: ${GITHUB_REDIRECT_URL}

mail:
  from-name: ${MAIL_FROM_NAME}

mailtrap:
  from-email: ${MAILTRAP_FROM_EMAIL}

app:
  frontend-url: ${FRONTEND_URL}

