services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-app
    restart: unless-stopped
    ports:
      - "${APPLICATION_PORT}:8000"
    environment:
      # App
      APP_NAME: ${APP_NAME}
      APPLICATION_PORT: ${APPLICATION_PORT}
      API_VERSION: ${API_VERSION}
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_DOMAINS: ${FRONTEND_DOMAINS}
      ALLOWED_METHODS: ${ALLOWED_METHODS}

      # MongoDB
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}

      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRATION: ${ACCESS_TOKEN_EXPIRATION}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION}
      REFRESH_ACCESS_TOKEN: ${REFRESH_ACCESS_TOKEN}

      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_TRAP_TOKEN: ${MAIL_TRAP_TOKEN}
      MAILTRAP_FROM_EMAIL: ${MAILTRAP_FROM_EMAIL}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}

      # Firebase
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY_ID: ${FIREBASE_PRIVATE_KEY_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_CLIENT_ID: ${FIREBASE_CLIENT_ID}
      FIREBASE_AUTH_URL: ${FIREBASE_AUTH_URL}
      FIREBASE_TOKEN_URL: ${FIREBASE_TOKEN_URL}
      FIREBASE_CERT_URL: ${FIREBASE_CERT_URL}

      # Stripe
      STRIPE_API_KEY: ${STRIPE_API_KEY}

      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

      # Groq AI
      GROQ_API_KEY: ${GROQ_API_KEY}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # GitHub OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URL: ${GITHUB_REDIRECT_URL}

      # Google Gemini
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      GOOGLE_GEMINI_PROJECT_NAME: ${GOOGLE_GEMINI_PROJECT_NAME}
      GOOGLE_GEMINI_PROJECT_NUMBER: ${GOOGLE_GEMINI_PROJECT_NUMBER}

      # Supabase
      SUPERBASE_PG_PASSWORD: ${SUPERBASE_PG_PASSWORD}

      # ── Seed Users ──────────────────────────────────────────
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_HOSPITAL_DIRECTOR_EMAIL: ${SEED_HOSPITAL_DIRECTOR_EMAIL}
